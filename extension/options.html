<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LeetLog</title>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 560px; margin: 40px auto;
         padding: 0 20px; background: #14181f; color: #e8edf6; }
  h1 { font-size: 20px; } h2 { font-size: 15px; margin-top: 28px; }
  .card { background: #1b212c; border: 1px solid #2a3242; border-radius: 10px; padding: 16px 18px; margin: 12px 0; }
  .card label { display: block; cursor: pointer; }
  .card input[type=radio] { margin-right: 8px; }
  .desc { font-size: 12.5px; color: #9aa5b8; margin: 6px 0 0 24px; line-height: 1.7; }
  .desc0 { font-size: 12.5px; color: #9aa5b8; line-height: 1.7; }
  .sub { margin: 12px 0 0 24px; }
  button { background: #2f6feb; color: #fff; border: 0; border-radius: 6px; padding: 7px 14px;
           font-size: 13px; cursor: pointer; } button:hover { background: #3b7cf7; }
  button.ghost { background: #2a3242; }
  select { background: #222937; color: #e8edf6; border: 1px solid #2a3242; border-radius: 6px; padding: 5px 8px; }
  .ok { color: #37c47f; } .bad { color: #ff6b6b; } .warn { color: #e8a13c; }
  #folderStatus { font-size: 13px; margin-top: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1 id="optTitle">📗 LeetLog</h1>

<h2 id="secMode"></h2>
<div class="card">
  <label><input type="radio" name="mode" value="bridge" id="modeBridge"><span id="modeBridgeLabel"></span></label>
  <div class="desc" id="modeBridgeDesc"></div>
</div>
<div class="card">
  <label><input type="radio" name="mode" value="folder" id="modeFolder"><span id="modeFolderLabel"></span></label>
  <div class="desc" id="modeFolderDesc"></div>
  <div class="sub">
    <button id="pickFolder"></button>
    <button id="grantFolder" class="ghost hidden"></button>
    <div id="folderStatus"></div>
  </div>
</div>

<h2 id="secCloud"></h2>
<div class="card">
  <div class="desc0" id="cloudDesc"></div>
  <div style="margin-top:12px" id="cloudForm">
    <div><span id="cloudUrlLabel"></span>
      <input type="text" id="cloudUrl" value="http://127.0.0.1:8800" style="width:260px;background:#222937;color:#e8edf6;border:1px solid #2a3242;border-radius:6px;padding:5px 8px"></div>
    <div style="margin-top:8px"><span id="cloudCodeLabel"></span>
      <input type="text" id="cloudCode" placeholder="XXXXXXXX" maxlength="8"
             style="width:140px;background:#222937;color:#e8edf6;border:1px solid #2a3242;border-radius:6px;padding:5px 8px;letter-spacing:3px;text-transform:uppercase">
      <button id="cloudConnect"></button></div>
  </div>
  <div id="cloudStatus" style="margin-top:10px;font-size:13px"></div>
  <button id="cloudDisconnect" class="ghost hidden" style="margin-top:8px"></button>
</div>

<h2 id="secLang"></h2>
<div class="card">
  <select id="lang">
    <option value="zh">中文</option>
    <option value="en">English</option>
  </select>
  <div class="desc0" id="langDesc" style="margin-top:8px"></div>
</div>

<div class="desc0" id="footer" style="margin-top:20px"></div>

<script src="note-writer.js"></script>
<script src="options.js"></script>
</body>
</html>
