<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LeetLog 设置</title>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 560px; margin: 40px auto;
         padding: 0 20px; background: #14181f; color: #e8edf6; }
  h1 { font-size: 20px; } h2 { font-size: 15px; margin-top: 28px; }
  .card { background: #1b212c; border: 1px solid #2a3242; border-radius: 10px; padding: 16px 18px; margin: 12px 0; }
  .card label { display: block; cursor: pointer; }
  .card input[type=radio] { margin-right: 8px; }
  .desc { font-size: 12.5px; color: #9aa5b8; margin: 6px 0 0 24px; line-height: 1.7; }
  .sub { margin: 12px 0 0 24px; }
  button { background: #2f6feb; color: #fff; border: 0; border-radius: 6px; padding: 7px 14px;
           font-size: 13px; cursor: pointer; } button:hover { background: #3b7cf7; }
  button.ghost { background: #2a3242; }
  select { background: #222937; color: #e8edf6; border: 1px solid #2a3242; border-radius: 6px; padding: 5px 8px; }
  .ok { color: #37c47f; } .bad { color: #ff6b6b; } .warn { color: #e8a13c; }
  #folderStatus { font-size: 13px; margin-top: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>📗 LeetLog 设置</h1>

<h2>笔记写入方式</h2>
<div class="card">
  <label><input type="radio" name="mode" value="bridge" id="modeBridge">本地桥接（默认）</label>
  <div class="desc">事件发给 127.0.0.1:8763 —— LeetLog Bridge Obsidian 插件或 Python 服务。
    适合 Obsidian 用户，笔记模板语言在桥接侧设置。</div>
</div>
<div class="card">
  <label><input type="radio" name="mode" value="folder" id="modeFolder">直写文件夹（无需 Obsidian）</label>
  <div class="desc">扩展直接把 Markdown 笔记写进你选的文件夹（浏览器 File System Access 授权，
    数据同样不离开本机）。选 Obsidian vault 里的子文件夹也可以，效果与桥接一致。</div>
  <div class="sub" id="folderControls">
    <button id="pickFolder">选择文件夹…</button>
    <button id="grantFolder" class="ghost hidden">重新授权</button>
    <div id="folderStatus"></div>
    <div style="margin-top:12px">
      笔记模板语言：
      <select id="lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>
</div>

<div class="desc" style="margin-left:0">修改即时生效。切换模式不影响已积压的离线队列——队列会发往新的目标。</div>

<script src="note-writer.js"></script>
<script src="options.js"></script>
</body>
</html>
