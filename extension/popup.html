<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; width: 260px; padding: 14px; margin: 0;
         background: #14181f; color: #e8edf6; }
  h1 { font-size: 15px; margin: 0 0 10px; }
  .row { font-size: 12.5px; line-height: 1.9; color: #9aa5b8; }
  .row b { color: #e8edf6; font-weight: 600; }
  .ok { color: #37c47f; } .bad { color: #ff6b6b; } .dim { color: #6b7688; }
  code { background: #222937; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
  a { color: #6ea8fe; }
  button { background: #2f6feb; color: #fff; border: 0; border-radius: 6px; padding: 5px 12px;
           font-size: 12px; cursor: pointer; margin-top: 4px; }
  h1 { display: flex; justify-content: space-between; align-items: center; }
  h1 a { font-size: 12px; font-weight: 400; }
</style>
</head>
<body>
<h1>📗 LeetLog <a href="#" id="openOptions">⚙️ 设置</a></h1>
<div id="status" class="row">检测中…</div>
<div id="due" class="row"></div>
<div id="queue" class="row"></div>
<div id="info" class="row"></div>
<script src="note-writer.js"></script>
<script src="popup.js"></script>
</body>
</html>
