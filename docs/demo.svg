    <text x="60" y="160" fill="#c586c0" font-size="13">class <tspan fill="#4ec9b0">Solution</tspan><tspan fill="#d4d4d4">:</tspan></text>
    <text x="76" y="182" fill="#c586c0" font-size="13">def <tspan fill="#dcdcaa">isPalindrome</tspan><tspan fill="#d4d4d4">(self, x: int) -&gt; bool:</tspan></text>
